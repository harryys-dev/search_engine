name: CI

on:
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod download
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v4
        with:
          version: latest
      - run: go test ./...
      - run: go build -o bin/server ./cmd/server

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: ESLint
        working-directory: web
        run: npx eslint src/
      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit
      - name: Build
        working-directory: web
        run: npm run build
