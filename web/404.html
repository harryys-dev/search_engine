<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Страница не найдена</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      .code {
        font-size: 8rem;
        font-weight: 800;
        color: #4a9eff;
        line-height: 1;
      }
      h1 {
        font-size: 1.5rem;
        margin: 1rem 0 0.5rem;
        color: #fff;
      }
      p {
        color: #888;
        margin-bottom: 2rem;
        font-size: 1.1rem;
      }
      a {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #4a9eff;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
        transition: background 0.2s;
      }
      a:hover {
        background: #3a8eef;
      }

  </head>
  <body>
    <div class="container">
      <img src="assets/network.png" alt="" />
      <h1>Страница не найдена</h1>
